<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Deteksi Jam</title>

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            background:
                radial-gradient(circle at top left, #1f3b73 0%, transparent 30%),
                radial-gradient(circle at bottom right, #7b2cbf 0%, transparent 30%),
                #0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            overflow:hidden;
        }

        .bg-blur{
            position:absolute;
            width:300px;
            height:300px;
            background:#3b82f6;
            filter:blur(120px);
            opacity:0.25;
            top:-100px;
            left:-100px;
            border-radius:50%;
        }

        .bg-blur2{
            position:absolute;
            width:300px;
            height:300px;
            background:#9333ea;
            filter:blur(120px);
            opacity:0.25;
            bottom:-100px;
            right:-100px;
            border-radius:50%;
        }

        .main-card{
            position:relative;
            width:720px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(20px);
            border-radius:28px;
            padding:25px;
            box-shadow:0 10px 40px rgba(0,0,0,0.5);
        }

        .header{
            text-align:center;
            margin-bottom:20px;
        }

        .header h1{
            font-size:2rem;
            font-weight:700;
            background:linear-gradient(to right,#60a5fa,#c084fc);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .header p{
            color:#cbd5e1;
            margin-top:8px;
            font-size:0.95rem;
        }

        .status-box{
            margin:20px 0;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            padding:14px;
            border-radius:15px;
            text-align:center;
            font-weight:600;
            color:#38bdf8;
            letter-spacing:1px;
        }

        .container{
            position:relative;
            width:100%;
            height:500px;
            border-radius:22px;
            overflow:hidden;
            border:2px solid rgba(255,255,255,0.1);
            background:black;
        }

        video,
        canvas#overlay{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
        }

        canvas#overlay{
            z-index:10;
            pointer-events:none;
        }

        .button-area{
            margin-top:25px;
            display:flex;
            justify-content:center;
        }

        .btn-start{
            padding:15px 35px;
            border:none;
            border-radius:16px;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            color:white;
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            transition:0.3s;
            box-shadow:0 8px 25px rgba(59,130,246,0.4);
        }

        .btn-start:hover{
            transform:translateY(-3px) scale(1.03);
            box-shadow:0 12px 30px rgba(139,92,246,0.5);
        }

        .info-box{
            display:flex;
            justify-content:space-between;
            gap:15px;
            margin-top:20px;
            flex-wrap:wrap;
        }

        .info-card{
            flex:1;
            min-width:180px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.1);
            padding:18px;
            border-radius:18px;
            text-align:center;
        }

        .info-card h3{
            font-size:1rem;
            margin-bottom:8px;
            color:#93c5fd;
        }

        .info-card p{
            color:#e2e8f0;
            font-size:0.9rem;
        }

        .live-dot{
            display:inline-block;
            width:10px;
            height:10px;
            background:#22c55e;
            border-radius:50%;
            margin-right:8px;
            animation:pulse 1s infinite;
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
                opacity:1;
            }
            50%{
                transform:scale(1.5);
                opacity:0.5;
            }
            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        @media(max-width:768px){

            .main-card{
                width:100%;
                padding:18px;
            }

            .container{
                height:380px;
            }

            .header h1{
                font-size:1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <div class="bg-blur2"></div>

    <div class="main-card">

        <div class="header">
    <h1>⌚ AI Watch Detector</h1>

    <p>
        Sistem Deteksi Otomatis 
        Jam Analog & Smartwatch
    </p>

    <p style="
        margin-top:10px;
        color:#94a3b8;
        font-size:0.9rem;
        letter-spacing:1px;
    ">
        Dibuat oleh <b>Tri Nur Raafi</b>
    </p>
</div>

        <div id="status" class="status-box">
            STATUS: BELUM AKTIF
        </div>

        <div class="container">
            <video id="webcam" playsinline muted autoplay></video>
            <canvas id="overlay" width="640" height="480"></canvas>
        </div>

        <div class="button-area">
            <button id="btn-init" class="btn-start">
                🎥 AKTIFKAN KAMERA
            </button>
        </div>

        <div class="info-box">

            <div class="info-card">
                <h3>📡 Status AI</h3>
                <p>
                    <span class="live-dot"></span>
                    Real-Time Detection
                </p>
            </div>

            <div class="info-card">
                <h3>⌚ Objek</h3>
                <p>Jam Analog & Smartwatch</p>
            </div>

            <div class="info-card">
                <h3>⚡ Teknologi</h3>
                <p>ONNX Runtime Web AI</p>
            </div>

        </div>

    </div>

    <!-- Processor Canvas -->
    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <!-- App JS -->
    <script src="app.js"></script>

</body>
</html>
